# OPTIONAL. This needs an ingress controller in the cluster. Docker Desktop does
# not ship one by default, so install ingress-nginx first:
#
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#
# Then apply this file and browse to http://n8n.localhost
# (Docker Desktop maps *.localhost to the ingress on 127.0.0.1).
#
# The NodePort Service (08) is the default, zero-dependency way to reach the UI;
# this Ingress is included to show the pattern.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  namespace: n8n
  labels:
    app: n8n-main
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
spec:
  ingressClassName: nginx
  rules:
    - host: n8n.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 5678

apiVersion: v1
kind: Service
metadata:
  name: n8n-nodeport
  namespace: n8n
  labels:
    app: n8n-main
spec:
  type: NodePort
  selector:
    app: n8n-main
  ports:
    - name: http
      port: 5678
      targetPort: 5678
      # Reach the UI at http://localhost:30678 on Docker Desktop.
      nodePort: 30678

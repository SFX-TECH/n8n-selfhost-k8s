apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-config
  namespace: n8n
  labels:
    app.kubernetes.io/part-of: n8n-selfhost
data:
  # --- Database (Postgres) ---
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: n8n
  DB_POSTGRESDB_SCHEMA: public

  # --- Queue mode ---
  # EXECUTIONS_MODE=queue makes the main process enqueue jobs to Redis and
  # workers execute them. It must be set on the main AND every worker.
  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: redis
  QUEUE_BULL_REDIS_PORT: "6379"
  # Exposes /healthz on the worker so Kubernetes probes can check worker health.
  QUEUE_HEALTH_CHECK_ACTIVE: "true"
  # By default manual (UI) executions run on the main process. This sends them
  # to a worker instead, so the worker-pickup demo is deterministic.
  OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"

  # Note: n8n 2.x has task runners always on, so N8N_RUNNERS_ENABLED is no longer
  # set here (n8n logs it as deprecated and no longer needed).

  # --- Access / hygiene ---
  N8N_PROTOCOL: http
  N8N_PORT: "5678"
  # Allow the auth cookie over plain HTTP (NodePort access is not HTTPS).
  N8N_SECURE_COOKIE: "false"
  N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
  GENERIC_TIMEZONE: Etc/UTC
  TZ: Etc/UTC

# n8n self-hosted stack: n8n + Postgres + Redis.
#
# Default `docker compose up -d` runs a single n8n node in regular execution
# mode, with Postgres for durable storage and Redis provisioned and health
# checked (ready for queue mode). The Kubernetes manifests under k8s/ show the
# full queue-mode topology with scaled workers.
#
# To run queue mode in Compose too: set EXECUTIONS_MODE=queue in .env and start
# with the worker profile:  docker compose --profile queue up -d
#
# All values come from .env (copy .env.example to .env first). No secrets live
# in this file.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-net

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.27.5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      # --- Database ---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: public
      # --- Encryption (must stay constant; identical across workers in queue mode) ---
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # --- Execution mode (regular by default; set to queue to use Redis + worker) ---
      EXECUTIONS_MODE: ${EXECUTIONS_MODE:-regular}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      # --- Task runners (current recommended default) ---
      N8N_RUNNERS_ENABLED: "true"
      # --- Host / access ---
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      # --- Hygiene ---
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Etc/UTC}
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - n8n-net

  # Optional worker for running Compose in queue mode.
  # Enable with:  docker compose --profile queue up -d   (and EXECUTIONS_MODE=queue in .env)
  n8n-worker:
    image: docker.n8n.io/n8nio/n8n:2.27.5
    restart: unless-stopped
    profiles: ["queue"]
    command: ["worker", "--concurrency=5"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: public
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_HEALTH_CHECK_ACTIVE: "true"
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Etc/UTC}
      TZ: ${TZ:-Etc/UTC}
    networks:
      - n8n-net

volumes:
  pg_data:
  n8n_data:

networks:
  n8n-net:
    driver: bridge
